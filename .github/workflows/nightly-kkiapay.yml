name: Nightly — KkiaPay E2E

on:
  schedule:
    - cron: "0 2 * * *" # 2am UTC daily
  workflow_dispatch:

jobs:
  kkiapay-e2e:
    name: KkiaPay E2E (live TKH Payments + sandbox)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run KkiaPay E2E test
        run: npm run test:kkiapay:live
        working-directory: frontend
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          PAYMENTS_SERVICE_URL: ${{ secrets.PAYMENTS_SERVICE_URL }}
          NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY }}
          NEXT_PUBLIC_KKIAPAY_SANDBOX: "true"
          # Staging URLs; configure in repo secrets for nightly runs
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
