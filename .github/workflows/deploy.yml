name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1
  AWS_ROLE_ARN: arn:aws:iam::873998455576:role/TKH-GitHubActionsRole
  SNS_DEPLOY_ARN: arn:aws:sns:ca-central-1:873998455576:tkh-deployment-alerts

jobs:
  deploy-dev:
    name: Deploy → Dev
    if: ${{ github.ref_type == 'branch' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Build & bundle Lambda
        run: npm run bundle
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Dev uses sandbox key (matches environments.ts kkiapayPublicKey for dev)
          NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY: ${{ secrets.KKIAPAY_SANDBOX_PUBLIC_KEY || secrets.NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY || '7f8733408b8a11f0bc43af9778631087' }}
          NEXT_PUBLIC_KKIAPAY_SANDBOX: "true"

      - name: Deploy to dev
        run: npm run cdk:deploy
        working-directory: backend
        env:
          CDK_CONTEXT_kkiapayPublicKey: ${{ secrets.KKIAPAY_SANDBOX_PUBLIC_KEY || secrets.NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY || '7f8733408b8a11f0bc43af9778631087' }}

      - name: Post-deploy health check (dev)
        run: |
          echo "Waiting 45s for deployment to propagate..."
          sleep 45
          DEV_URL="https://dev.kabasika.com"
          echo "Checking $DEV_URL..."
          curl -sf -o /dev/null -w "%{http_code}" "$DEV_URL" | grep -qE '^[23]' || { echo "Dev frontend unreachable"; exit 1; }
          echo "Checking $DEV_URL/auth/callback..."
          curl -sfL -o /dev/null -w "%{http_code}" "$DEV_URL/auth/callback" | grep -qE '^[23]' || { echo "Auth callback unreachable"; exit 1; }
          echo "Health check passed."

      - name: Notify Slack
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI="SUCCESS" ; [ "$STATUS" != "success" ] && EMOJI="FAILED"
          aws sns publish \
            --region ca-central-1 \
            --topic-arn "$SNS_DEPLOY_ARN" \
            --subject "Kaba Deploy - Dev - ${STATUS}" \
            --message "${EMOJI}: Kaba deploy to dev ${STATUS}. Commit: ${{ github.sha }} Branch: ${{ github.ref_name }} By: ${{ github.actor }} Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-prod:
    name: Deploy → Prod
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Build & bundle Lambda
        run: npm run bundle
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY }}
          NEXT_PUBLIC_KKIAPAY_SANDBOX: "false"

      - name: Deploy to prod
        run: npm run cdk:deploy:prod
        working-directory: backend
        env:
          CDK_CONTEXT_kkiapayPublicKey: ${{ secrets.NEXT_PUBLIC_KKIAPAY_PUBLIC_KEY }}

      - name: Notify Slack
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          EMOJI="SUCCESS" ; [ "$STATUS" != "success" ] && EMOJI="FAILED"
          aws sns publish \
            --region ca-central-1 \
            --topic-arn "$SNS_DEPLOY_ARN" \
            --subject "Kaba Deploy - Prod - ${STATUS}" \
            --message "${EMOJI}: Kaba deploy to prod ${STATUS}. Tag: ${{ github.ref_name }} Commit: ${{ github.sha }} By: ${{ github.actor }} Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
